name: Monitor
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run monitor
        run: python monitor.py
        env:
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          SERVICE_EMAIL:    ${{ secrets.SERVICE_EMAIL }}
          SERVICE_PASSWORD: ${{ secrets.SERVICE_PASSWORD }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          SERVICE_API_URL:       ${{ secrets.SERVICE_API_URL }}
          SERVICE_BOOKING_URL:   ${{ secrets.SERVICE_BOOKING_URL }}
          SERVICE_LOCATION_NAME: ${{ secrets.SERVICE_LOCATION_NAME }}
          SERVICE_LOCATION_ID:   ${{ secrets.SERVICE_LOCATION_ID }}
          SERVICE_RES_TYPE_ID:   ${{ secrets.SERVICE_RES_TYPE_ID }}
          SERVICE_FED_ID:        ${{ secrets.SERVICE_FED_ID }}
          SERVICE_ORG_ID:        ${{ secrets.SERVICE_ORG_ID }}
          SERVICE_CLUB_ID:       ${{ secrets.SERVICE_CLUB_ID }}
