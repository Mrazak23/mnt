name: Tour Monitor
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run monitor
        run: python tour_monitor.py
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          SERVICE_API_URL:     ${{ secrets.SERVICE_API_URL }}
          SERVICE_COMPANY_ID:  ${{ secrets.SERVICE_COMPANY_ID }}
          SERVICE_CLUB_ID:     ${{ secrets.SERVICE_CLUB_ID }}
          SERVICE_DOMAIN:      ${{ secrets.SERVICE_DOMAIN }}
          SERVICE_EVENT_URL:   ${{ secrets.SERVICE_EVENT_URL }}
